<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>body{background:#0a0a0f;color:#fff;padding:24px;font-family:sans-serif}span{color:#6e56f7;margin-right:14px}</style>
</head><body>
<div id="root"></div>
<pre id="log" style="color:#8a8aa0;font-size:11px"></pre>
<script type="text/babel" data-presets="react">
function toPascal(name){ return name.split('-').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(''); }
function svgFor(name, size){
  const node = lucide.icons[toPascal(name)];
  if(!node){ return '<!--missing '+name+'-->'; }
  const inner = node.map(([tag, attrs]) => '<'+tag+' '+Object.entries(attrs).map(([k,v])=>k+'="'+v+'"').join(' ')+'/>').join('');
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
}
function Icon({name,size=22}){ return <span dangerouslySetInnerHTML={{__html: svgFor(name,size)}} />; }
const names = ['play','square','rewind','flip-horizontal-2','chevrons-down','settings','search','timer','hourglass','mic'];
document.getElementById('log').textContent = 'lucide keys: '+Object.keys(lucide.icons||{}).length+' | Play node: '+JSON.stringify(lucide.icons['Play']).slice(0,160);
ReactDOM.createRoot(document.getElementById('root')).render(<div>{names.map(n=><Icon key={n} name={n}/>)}</div>);
</script>
</body></html>
