<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="630" fill="#6e56f7"></rect>
  <rect x="600" width="600" height="630" fill="#0e0e1a"></rect>
  <rect x="598" y="0" width="4" height="630" fill="#ffffff"></rect>
  <svg x="200" y="215" width="200" height="200" viewBox="0 0 88 88" overflow="visible">
    <defs>
      <filter id="oggf" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
      <filter id="oggs" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
      <clipPath id="ogsq"><rect x="4" y="4" width="80" height="80" rx="20"></rect></clipPath>
      <linearGradient id="ogsh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,0.42)"></stop><stop offset="45%" stop-color="rgba(255,255,255,0.10)"></stop><stop offset="100%" stop-color="rgba(255,255,255,0)"></stop></linearGradient>
    </defs>
    <rect x="2" y="2" width="84" height="84" rx="22" fill="rgba(255,255,255,0.18)"></rect>
    <g clip-path="url(#ogsq)">
      <rect x="4" y="4" width="80" height="40" fill="#f2f2f7"></rect>
      <rect x="4" y="44" width="80" height="40" fill="#0e0e1a"></rect>
      <rect x="4" y="41.5" width="80" height="5" fill="#6e56f7" filter="url(#oggf)"></rect>
      <rect x="11" y="42" width="66" height="4" fill="rgba(110,86,247,0.5)" filter="url(#oggs)"></rect>
      <rect x="4" y="4" width="80" height="80" fill="url(#ogsh)"></rect>
    </g>
  </svg>
  <!--
    The three text runs below are placeholders, replaced at build time by
    site/scripts/og-image.mjs with pre-shaped <path> outlines (via
    opentype.js) instead of being rendered live by resvg. resvg-js 2.6.2 has
    a font-matching bug specific to its Linux binary — <text> with a custom
    buffered font silently falls back to a generic placeholder face there
    (confirmed: identical script/font renders correctly on macOS, wrong on
    Linux/CI, reproduced in a linux/amd64 container). Baking glyphs to paths
    at build time sidesteps runtime font matching entirely, so rasterization
    is deterministic on every platform. data-* attributes carry what the
    script needs (text, weight, size, letter-spacing) to reproduce each run;
    they're not real SVG semantics.
  -->
  <g data-og-text="wordmark" data-x="660" data-y="290" data-weight="700" data-size="72" data-letter-spacing="-2">
    <!-- run 1: "eyeread" #f2f2f7, run 2: ".in" #6e56f7 -->
  </g>
  <g data-og-text="subtitle1" data-x="660" data-y="344" data-weight="500" data-size="22" data-fill="#7a7a92">Invisible teleprompter.</g>
  <g data-og-text="subtitle2" data-x="660" data-y="374" data-weight="500" data-size="22" data-fill="#7a7a92">Voice tracking built in.</g>
</svg>