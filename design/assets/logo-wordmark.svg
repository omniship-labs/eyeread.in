  <text x="60" y="32" font-family="&#39;Space Grotesk&#39;, sans-serif" font-size="25" font-weight="700" letter-spacing="-0.4" fill="#f2f2f7">eyeread<tspan fill="#6e56f7">.in</tspan></text>
