  <path d="M2 24 C5 12 12 8 24 8 C36 8 43 12 46 24 C43 36 36 40 24 40 C12 40 5 36 2 24Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.1"></path>
  <circle cx="24" cy="24" r="8.5" fill="rgba(110,86,247,0.06)" stroke="rgba(110,86,247,0.45)" stroke-width="1.1"></circle>
