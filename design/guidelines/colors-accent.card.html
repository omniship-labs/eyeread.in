<!-- @dsCard group="Colors" viewport="700x180" name="Accent · electric indigo" subtitle="Primary accent ramp + glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 9px 11px; }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); margin-top: 2px; }
  .glow { display: flex; align-items: center; justify-content: center; flex: 1.3; border-radius: var(--radius-md); background: var(--surface-1); border: 1px solid var(--border-subtle); }
  .orb { width: 46px; height: 46px; border-radius: 50%; background: var(--accent); box-shadow: var(--glow-accent-lg); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--indigo-300)"></div><div class="meta"><div class="name">indigo-300</div><div class="val">#b6a8ff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--indigo-400)"></div><div class="meta"><div class="name">indigo-400</div><div class="val">#8a76ff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--indigo-500);box-shadow:inset 0 0 0 2px rgba(255,255,255,0.3)"></div><div class="meta"><div class="name">indigo-500 ·<span style="color:var(--accent-text)"> accent</span></div><div class="val">#6e56f7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--indigo-600)"></div><div class="meta"><div class="name">indigo-600</div><div class="val">#5a42e0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--indigo-700)"></div><div class="meta"><div class="name">indigo-700</div><div class="val">#4632b8</div></div></div>
    <div class="glow"><div class="orb"></div></div>
  </div>
</body>
</html>
