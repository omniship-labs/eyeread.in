<style>
  body { margin: 0; padding: 26px 28px; background: var(--bg-base); }
  .wrap { display: flex; flex-direction: column; gap: 22px; max-width: 640px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 11px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ct { font-family: var(--font-sans); font-weight: 600; font-size: 14px; color: var(--text-primary); margin-bottom: 4px; }

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Card, Badge, Avatar } = window.TelepromptDDesignSystem_019e26;
    const Icon = window.TpdIcon;
    function Demo() {
      return (
        <div className="wrap">
          <div>
            <div className="lbl">Card · variants</div>
            <div className="cards">
              <Card><div className="ct">Default</div><div className="cs">App chrome surface</div></Card>
              <Card variant="raised"><div className="ct">Raised</div><div className="cs">Elevated panel</div></Card>

          </div>
          <div>

              <Badge tone="accent" dot>Live</Badge>
              <Badge tone="record" dot>Rec</Badge>
              <Badge tone="success" dot>Synced</Badge>
              <Badge tone="warning" dot>Paused</Badge>

          </div>

              <Avatar name="Maya Okafor" status="online" />
              <Avatar name="Sam Reed" accent size="lg" status="live" />
              <Avatar name="Devin Lee" size="sm" />
              <Avatar name="Ana Cruz" size="xl" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
