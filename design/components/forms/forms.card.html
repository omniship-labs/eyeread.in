<!-- @dsCard group="Components" viewport="700x520" name="Forms · buttons, inputs, controls" subtitle="Button, IconButton, Input, Switch, Slider, Segmented" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px 28px; background: var(--bg-base); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px 36px; max-width: 640px; }
  .block { display: flex; flex-direction: column; gap: 12px; }
  .block.full { grid-column: 1 / -1; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton, Input, Switch, Slider, Segmented } = window.TelepromptDDesignSystem_019e26;
    function toPascal(name){ return name.split('-').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(''); }
    function svgFor(name, size){
      const node = lucide.icons[toPascal(name)];
      if(!node) return '';
      const inner = node.map(([tag, attrs]) => '<'+tag+' '+Object.entries(attrs).map(([k,v])=>k+'="'+v+'"').join(' ')+'/>').join('');
      return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
    }
    function Icon({ name, size=18 }) {
      return React.createElement('span', { style:{ display:'inline-flex' }, dangerouslySetInnerHTML:{ __html: svgFor(name, size) } });
    }

    function Demo() {
      const [mode, setMode] = React.useState('up');
      const [layout, setLayout] = React.useState('center');
      const [on, setOn] = React.useState(true);
      const [wpm, setWpm] = React.useState(142);
      const [size, setSize] = React.useState(46);
      return (
        <div className="grid">
          <div className="block">
            <div className="lbl">Button · variants</div>
            <div className="row">
              <Button variant="primary" iconLeft={<Icon name="play" size={17}/>}>Start</Button>
              <Button variant="secondary">Library</Button>
              <Button variant="ghost">Skip</Button>
            </div>
            <div className="row">
              <Button variant="subtle" size="sm">Add cue</Button>
              <Button variant="danger" size="sm" iconLeft={<Icon name="square" size={15}/>}>Stop</Button>
              <Button variant="primary" size="sm" disabled>Disabled</Button>
            </div>
          </div>

          <div className="block">
            <div className="lbl">Icon buttons</div>
            <div class="row">
              <IconButton label="Play" variant="accent"><Icon name="play"/></IconButton>
              <IconButton label="Rewind" variant="solid"><Icon name="rewind"/></IconButton>
              <IconButton label="Mirror"><Icon name="flip-horizontal-2"/></IconButton>
              <IconButton label="Auto-scroll" active><Icon name="chevrons-down"/></IconButton>
              <IconButton label="Settings"><Icon name="settings"/></IconButton>
            </div>
          </div>

          <div className="block">
            <div className="lbl">Input</div>
            <Input icon={<Icon name="search" size={17}/>} placeholder="Search scripts" />
            <Input label="Script title" defaultValue="Q3 Keynote — open" />
          </div>

          <div className="block">
            <div className="lbl">Switch</div>
            <Switch label="Hide from screen-share" checked={on} onChange={e=>setOn(e.target.checked)} />
            <Switch label="Mirror text" defaultChecked={false} />
          </div>

          <div className="block full">
            <div className="lbl">Segmented · timer mode &nbsp;·&nbsp; reading layout</div>
            <div className="row" style={{gap:'16px'}}>
              <Segmented value={mode} onChange={setMode} options={[
                { value:'off', label:'Off' },
                { value:'up', label:'Count up' },
                { value:'down', label:'Countdown' },
              ]} />
              <Segmented size="sm" value={layout} onChange={setLayout} options={[
                { value:'center', label:'Center' },
                { value:'top', label:'Near camera' },
                { value:'full', label:'Full' },
              ]} />
            </div>
          </div>

          <div className="block full">
            <div className="lbl">Slider</div>
            <div className="row" style={{gap:'28px'}}>
              <div style={{flex:1}}><Slider label="Scroll speed" min={60} max={240} value={wpm} onChange={e=>setWpm(+e.target.value)} formatValue={v=>`${v} wpm`} /></div>
              <div style={{flex:1}}><Slider label="Text size" min={22} max={72} value={size} onChange={e=>setSize(+e.target.value)} suffix="px" /></div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
