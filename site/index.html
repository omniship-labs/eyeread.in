<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon is set from the design brand mark in main.jsx -->

    <!--
      GitHub Pages serves this site with no way to set custom HTTP response
      headers, so X-Frame-Options / X-Content-Type-Options / HSTS tuning /
      Permissions-Policy can't be set at all here — those need a CDN in
      front of Pages. CSP and Referrer-Policy are the two security headers
      browsers also honor via <meta>, so they're set here instead.
      Origins allowed: 'self' (bundled assets — fonts/images are all local,
      nothing loads from a font/script CDN), api.github.com (release notes
      on the Download page), opencollective.com + images.opencollective.com
      (live sponsor/backer list and avatars). style-src needs unsafe-inline
      for a couple of components' dynamic inline styles (slider position,
      avatar size vars) — script-src has no such exception.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.opencollective.com; font-src 'self'; connect-src 'self' https://api.github.com https://opencollective.com https://images.opencollective.com; object-src 'none'; base-uri 'none'; form-action 'self'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>eyeread.in — Look at the lens.</title>
    <meta
      name="description"
      content="Open source teleprompter. Floats your script over any screen, invisible to every recorder. Voice tracking built in. Free."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="eyeread.in — Look at the lens." />
    <meta
      property="og:description"
      content="Open source teleprompter. Floats your script over any screen, invisible to every recorder. Voice tracking built in."
    />
    <meta property="og:image" content="https://get.eyeread.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://get.eyeread.in" />
    <meta property="og:locale" content="en_US" />
    <link rel="canonical" href="https://get.eyeread.in/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@eyeread_in" />
    <meta name="twitter:title" content="eyeread.in — Look at the lens." />
    <meta name="twitter:image" content="https://get.eyeread.in/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
