<!-- @dsCard group="Components" viewport="700x300" name="Prompter · script reader" subtitle="Voice-tracking highlight — watch the glow follow along" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../assets/lucide-icon.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px 28px; background: var(--bg-base);
    background-image: radial-gradient(900px 400px at 70% -10%, rgba(110,86,247,0.10), transparent 70%); }
  .stage { max-width: 560px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
  .controls { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .timer { margin-left: auto; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Card, ScriptViewer, IconButton } = window.TelepromptDDesignSystem_019e26;
    const Icon = window.TpdIcon;
    const SCRIPT = "Look right at the lens. The overlay floats over your slides, stays invisible on the recording, and follows every word you say.";
    const TOTAL = SCRIPT.split(/\s+/).length;

    function fmt(t){ const m=Math.floor(t/60), s=t%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }

    function Demo() {
      const [active, setActive] = React.useState(8);
      const [playing, setPlaying] = React.useState(true);
      const [sec, setSec] = React.useState(72);
      React.useEffect(() => {
        if (!playing) return;
        const id = setInterval(() => {
          setActive(a => (a + 1) % TOTAL);
          setSec(s => s + 1);
        }, 520);
        return () => clearInterval(id);
      }, [playing]);
      return (
        <div className="stage">
          <div className="lbl">Glass card · script reader · timer</div>
          <Card variant="glass" padding="lg" style={{ boxShadow:'var(--glow-accent)', borderColor:'var(--accent-subtle-border)' }}>
            <ScriptViewer text={SCRIPT} active={active} size="lg" />
            <div className="controls">
              <IconButton label="Restart" onClick={() => { setActive(0); setSec(0); }}><Icon name="rotate-ccw"/></IconButton>
              <IconButton label={playing ? 'Pause' : 'Play'} variant="accent" onClick={() => setPlaying(p => !p)}>
                <Icon name={playing ? 'pause' : 'play'} />
              </IconButton>
              <IconButton label="Mirror"><Icon name="flip-horizontal-2"/></IconButton>
              <div className="timer"><Icon name="timer" size={14}/>{fmt(sec)}</div>
            </div>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
