<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../assets/lucide-icon.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px 28px; background: var(--bg-base); }
  .wrap { display: flex; flex-direction: column; gap: 26px; max-width: 560px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Tabs } = window.TelepromptDDesignSystem_019e26;
    const Icon = window.TpdIcon;
    function Demo() {
      const [a, setA] = React.useState('scripts');
      const [b, setB] = React.useState('center');
      return (
        <div className="wrap">
          <div>
            <div className="lbl">Tabs · line</div>
            <Tabs value={a} onChange={setA} items={[
              { value:'scripts', label:'Scripts', icon:<Icon name="file-text" size={16}/>, count:12 },
              { value:'recs', label:'Recordings', icon:<Icon name="circle-play" size={16}/> },
              { value:'settings', label:'Settings', icon:<Icon name="settings" size={16}/> },
            ]} />
          </div>
          <div>
            <div className="lbl">Tabs · pill</div>
            <Tabs variant="pill" value={b} onChange={setB} items={[
              { value:'center', label:'Center' },
              { value:'top', label:'Near camera' },
              { value:'full', label:'Full screen' },
            ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
