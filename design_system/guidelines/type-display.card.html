<!-- @dsCard group="Type" viewport="700x190" name="Display · Space Grotesk" subtitle="Geometric, technical headings & marketing display" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); }
  .big { font-family: var(--font-display); font-weight: 700; font-size: 56px; letter-spacing: var(--tracking-tight); line-height: 1; color: var(--text-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); margin: 14px 0 12px; }
  .scale { display: flex; align-items: baseline; gap: 22px; flex-wrap: wrap; font-family: var(--font-display); color: var(--text-secondary); }
  .scale span { letter-spacing: var(--tracking-tight); }
</style>
</head>
<body>
  <div class="big">Speak like a pro.</div>
  <div class="meta">Space Grotesk · 700 / 600 / 500 · tracking −0.02em</div>
  <div class="scale">
    <span style="font-size:36px">Aa</span>
    <span style="font-size:28px">Aa</span>
    <span style="font-size:22px">Aa</span>
    <span style="font-size:18px;font-weight:500">Aa</span>
    <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-tertiary)">123 · &amp; · eyeread.in</span>
  </div>
</body>
</html>
