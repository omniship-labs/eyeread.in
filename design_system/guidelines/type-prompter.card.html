<!-- @dsCard group="Type" viewport="700x230" name="Prompter reading scale" subtitle="Large adjustable sizes — the script the speaker reads" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); font-family: var(--font-prompt); }
  .line { font-weight: 500; line-height: 1.3; color: var(--text-primary); margin-bottom: 4px; }
  .spoken { color: var(--prompt-upcoming); }
  .active { color: #fff; text-shadow: var(--glow-text); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); margin-top: 16px; }
  .sizes { display: flex; gap: 16px; align-items: baseline; margin-top: 8px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="line" style="font-size:46px"><span class="spoken">Look at the lens — </span><span class="active">read the highlighted line.</span></div>
  <div class="sizes">
    <span style="font-size:28px;font-weight:500">28</span>
    <span style="font-size:36px;font-weight:500">36</span>
    <span style="font-size:46px;font-weight:500">46</span>
    <span style="font-size:58px;font-weight:500">58</span>
  </div>
  <div class="meta">Hanken Grotesk · prompt-sm → prompt-xl · spoken dims, active glows</div>
</body>
</html>
