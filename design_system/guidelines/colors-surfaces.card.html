<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces · near-black ramp" subtitle="Ink ramp from app void to raised cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 9px 11px; }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-1000)"></div><div class="meta"><div class="name">sunken</div><div class="val">#060609</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">base</div><div class="val">#0a0a0f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="name">surface-1</div><div class="val">#13131c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">surface-2</div><div class="val">#1a1a26</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="meta"><div class="name">surface-3</div><div class="val">#232331</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">hairline</div><div class="val">#2e2e3e</div></div></div>
  </div>
</body>
</html>
