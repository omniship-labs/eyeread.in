<!-- @dsCard group="Type" viewport="700x210" name="Body · Hanken Grotesk" subtitle="Readable UI text and long-form body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); font-family: var(--font-sans); }
  .lede { font-size: 18px; line-height: 1.5; font-weight: 500; color: var(--text-primary); max-width: 560px; }
  .para { font-size: 15px; line-height: 1.55; color: var(--text-secondary); max-width: 560px; margin-top: 10px; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-tertiary); margin-top: 14px; }
  .weights { display: flex; gap: 18px; margin-top: 10px; font-size: 16px; }
  .weights span { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="lede">Your script floats over whatever you're sharing — and stays out of the recording.</div>
  <div class="para">Voice detection follows along as you talk, highlighting the line you're on and queuing what's next, so your eyes never leave the lens.</div>
  <div class="weights">
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">Semibold</span>
    <span style="font-weight:700">Bold</span>
    <span style="font-weight:800">Extrabold</span>
  </div>
  <div class="meta">Hanken Grotesk · 400–800</div>
</body>
</html>
