<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="eyeread">
  <defs>
    
    <linearGradient id="glass-fill" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.13)"></stop>
      <stop offset="1" stop-color="rgba(255,255,255,0.04)"></stop>
    </linearGradient>
    
    <linearGradient id="shine" x1="32" y1="0" x2="32" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"></stop>
      <stop offset="1" stop-color="rgba(255,255,255,0)"></stop>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="glow-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    
    <clipPath id="ec">
      <path d="M 8 32 C 12 17 22 12 32 12 C 42 12 52 17 56 32 C 52 47 42 52 32 52 C 22 52 12 47 8 32 Z"></path>
    </clipPath>
  </defs>

  
  <rect x="1" y="1" width="62" height="62" rx="17" fill="url(#glass-fill)" stroke="rgba(255,255,255,0.18)" stroke-width="1"></rect>
  
  <rect x="1" y="1" width="62" height="32" rx="17" fill="url(#shine)"></rect>

  
  <path d="M 8 32 C 12 17 22 12 32 12 C 42 12 52 17 56 32 C 52 47 42 52 32 52 C 22 52 12 47 8 32 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"></path>

  
  <circle cx="32" cy="32" r="11" fill="rgba(110,86,247,0.08)" stroke="rgba(110,86,247,0.5)" stroke-width="1.2"></circle>

  
  <g clip-path="url(#ec)">
    <rect x="11" y="26.5" width="42" height="2.5" rx="1.25" fill="rgba(255,255,255,0.1)"></rect>
    
    <rect x="8" y="30.5" width="48" height="3.5" rx="1.75" fill="#6e56f7" filter="url(#glow)"></rect>
    
    <rect x="14" y="31" width="36" height="3" rx="1.5" fill="rgba(110,86,247,0.5)" filter="url(#glow-soft)"></rect>
    <rect x="11" y="36.5" width="42" height="2.5" rx="1.25" fill="rgba(255,255,255,0.08)"></rect>
  </g>

  
  <circle cx="39" cy="24" r="2.5" fill="rgba(255,255,255,0.28)" filter="url(#glow-soft)"></circle>
</svg>