name: Compatibility report
description: Tell us whether screen-share invisibility works on your OS / setup.
title: '[Compat]: '
labels: ['compatibility', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping verify eyeread.in! Once a maintainer accepts your
        report it's added to the [compatibility matrix](https://eyeread.in/#compatibility)
        on the site and the About window — **credited to your GitHub account**
        (the one filing this issue), so there's no need to type a handle.

        **How to test (please actually do this):**
        1. Open the overlay and make sure **Hide from screen-share** is ON.
        2. Start a real screen share or recording — **Zoom, Google Meet, Teams,
           OBS, or QuickTime** — and look at the **captured/recorded output**,
           not your own screen.
        3. Note whether the overlay is there or not.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      description: e.g. "macOS 15 Sequoia", "Windows 11 23H2", "Ubuntu 24.04 LTS"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: >
        macOS/Windows: chip or arch (Apple Silicon / Intel / x64).
        Linux: desktop + session, e.g. "GNOME · Wayland", "KDE Plasma 6 · X11".
        Run `echo $XDG_SESSION_TYPE` if unsure whether you're on Wayland or X11.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: What did you share?
      description: >
        This matters — exclude-from-capture can behave differently for a whole
        display vs. a single window. Test whole-screen if you can.
      options:
        - Whole screen / entire display
        - A single window or app
        - Both
    validations:
      required: true

  - type: dropdown
    id: result
    attributes:
      label: Result — was the overlay hidden from the capture?
      options:
        - Hidden — excluded from capture (works)
        - Partial — hidden in some capture tools but not others
        - Visible — the overlay showed up in the capture (does NOT work)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: tools
    attributes:
      label: Which capture tools did you test?
      multiple: true
      options:
        - Zoom
        - Google Meet
        - Microsoft Teams
        - OBS Studio
        - QuickTime
        - Discord
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: eyeread.in version (optional)
      description: Helps us triage if something regressed. Find it in the About window.
      placeholder: 'e.g. 0.1.0'

  - type: textarea
    id: notes
    attributes:
      label: Evidence / notes
      description: >
        Anything useful — which tools differed, a screenshot of the captured
        output, compositor quirks, or the name of an "Other" tool you picked
        above. (Don't paste anything you wouldn't want public.)

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I started a real screen share / recording and checked the captured output (not just my local screen).
          required: true
        - label: This is my own first-hand test, not copied from someone else's report.
          required: true
