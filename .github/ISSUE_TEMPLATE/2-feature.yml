name: Feature Request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below. The more context you give, the easier it is to evaluate and prioritize.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or pain point. "I'm trying to… but…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Feel free to include mockups or examples.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you thought of.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — affects my workflow
        - Blocking — I can't use the app without it
    validations:
      required: true
