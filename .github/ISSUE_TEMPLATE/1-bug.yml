name: Bug Report
description: Something isn't working correctly.
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: eyeread.in version
      placeholder: 'e.g. 0.1.0'
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: 'e.g. Sequoia 15.4'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any console output or attach screenshots if helpful.
      render: shell

  - type: checkboxes
    id: cla
    attributes:
      label: Contributor agreement
      options:
        - label: I have read the [CLA](../../CLA.md) and agree to its terms if I submit any code as part of this issue.
          required: false
