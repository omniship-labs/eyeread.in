name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check .
      - run: npm test
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: src-tauri
      - name: Check formatting
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

  # macOS/Windows have platform-only code (window-vibrancy, Liquid Glass,
  # Acrylic, etc.) that only type-checks with a real Apple/MSVC toolchain —
  # cross-compiling those from the Linux `rust` job above can't catch it.
  # `cargo check` also fully validates tauri.conf.json, since
  # tauri::generate_context!() deserializes it into a strongly-typed Config
  # struct at compile time and fails the build on any invalid field.
  rust-native-targets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            name: macOS
          - runner: windows-latest
            name: Windows
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: src-tauri
      - name: Check (${{ matrix.name }} toolchain)
        run: cargo check
        working-directory: src-tauri
