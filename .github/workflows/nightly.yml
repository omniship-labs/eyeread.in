# Nightly build — triggered on every push to the `dev` branch and once
# daily at 03:00 UTC. Always force-updates the same "nightly" release tag
# so the updater endpoint URL never changes.
#
# The stamp job computes the version string once and passes it to both
# the build matrix and the publish job, preventing a midnight-crossing race
# where the two jobs would stamp different dates.
#
# Same secrets as the stable workflow are required.

name: Nightly

on:
  push:
    branches: [dev]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      nightly_version: ${{ steps.compute.outputs.nightly_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute nightly version
        id: compute
        run: |
          STAMP=$(date -u +"%Y%m%d")
          BASE=$(node -p "require('./package.json').version")
          echo "nightly_version=${BASE}-nightly.${STAMP}" >> "$GITHUB_OUTPUT"

  build:
    needs: [stamp]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            bundles: dmg,updater
          - target: x86_64-apple-darwin
            runner: macos-13
            bundles: dmg,updater
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            bundles: nsis,updater
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            bundles: nsis,updater
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            bundles: appimage,deb,updater

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - name: Generate icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Stamp nightly version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ needs.stamp.outputs.nightly_version }}
        run: |
          # Cross-platform stamp (macOS + Windows runners) — see release.yml.
          node -e "
            const fs = require('fs');
            const v = process.env.NIGHTLY_VERSION;
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = v;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            const c = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('src-tauri/Cargo.toml', c.replace(/^version = \".*\"/m, 'version = \"' + v + '\"'));
          "

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        uses: ./.github/actions/import-apple-cert
        with:
          certificate: ${{ secrets.APPLE_CERTIFICATE }}
          certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Configure Windows code signing (Azure Trusted Signing)
        if: runner.os == 'Windows'
        shell: bash
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
        run: |
          # Gated on secrets — see release.yml for details.
          if [ -z "$AZURE_ENDPOINT" ]; then
            echo "::notice::Azure Trusted Signing not configured — Windows installer will be Tauri-signed only."
            exit 0
          fi
          cargo install trusted-signing-cli --locked
          cat > sign.windows.conf.json <<EOF
          {
            "bundle": {
              "windows": {
                "signCommand": {
                  "cmd": "trusted-signing-cli",
                  "args": ["-e", "$AZURE_ENDPOINT", "-a", "$AZURE_ACCOUNT", "-c", "$AZURE_CERT_PROFILE", "%1"]
                }
              }
            }
          }
          EOF
          echo "WINDOWS_SIGN_CONFIG=--config sign.windows.conf.json" >> "$GITHUB_ENV"

      - name: Build, sign & notarize (nightly config)
        shell: bash
        env:
          RELEASE_CHANNEL: nightly
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          npm run tauri build -- \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundles }} \
            --config src-tauri/tauri.nightly.conf.json \
            $WINDOWS_SIGN_CONFIG

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  publish:
    needs: [stamp, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json
        env:
          NIGHTLY_VERSION: ${{ needs.stamp.outputs.nightly_version }}
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}/releases/download/nightly"

          ARM_SIG=$(cat artifacts/nightly-aarch64-apple-darwin/*.app.tar.gz.sig)
          X86_SIG=$(cat artifacts/nightly-x86_64-apple-darwin/*.app.tar.gz.sig)
          WIN_SIG=$(cat artifacts/nightly-x86_64-pc-windows-msvc/*-setup.exe.sig)
          WINARM_SIG=$(cat artifacts/nightly-aarch64-pc-windows-msvc/*-setup.exe.sig)
          LINUX_SIG=$(cat artifacts/nightly-x86_64-unknown-linux-gnu/*.AppImage.sig)

          cat > latest.json <<EOF
          {
            "version": "$NIGHTLY_VERSION",
            "notes": "Nightly build — may be unstable.",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "$REPO/eyeread.in_nightly_aarch64.app.tar.gz",
                "signature": "$ARM_SIG"
              },
              "darwin-x86_64": {
                "url": "$REPO/eyeread.in_nightly_x86_64.app.tar.gz",
                "signature": "$X86_SIG"
              },
              "windows-x86_64": {
                "url": "$REPO/eyeread.in_nightly_x64-setup.exe",
                "signature": "$WIN_SIG"
              },
              "windows-aarch64": {
                "url": "$REPO/eyeread.in_nightly_arm64-setup.exe",
                "signature": "$WINARM_SIG"
              },
              "linux-x86_64": {
                "url": "$REPO/eyeread.in_nightly_amd64.AppImage",
                "signature": "$LINUX_SIG"
              }
            }
          }
          EOF

      - name: Normalize artifact filenames
        run: |
          for arch in aarch64 x86_64; do
            src=$(ls artifacts/nightly-${arch}-apple-darwin/*.app.tar.gz)
            cp "$src" "eyeread.in_nightly_${arch}.app.tar.gz"
            cp "${src}.sig" "eyeread.in_nightly_${arch}.app.tar.gz.sig"
            cp $(ls artifacts/nightly-${arch}-apple-darwin/*.dmg) "eyeread.in_nightly_${arch}.dmg"
          done
          # Windows installers — pin to stable names (the `nightly` tag is reused).
          win_src=$(ls artifacts/nightly-x86_64-pc-windows-msvc/*-setup.exe)
          cp "$win_src" "eyeread.in_nightly_x64-setup.exe"
          cp "${win_src}.sig" "eyeread.in_nightly_x64-setup.exe.sig"
          winarm_src=$(ls artifacts/nightly-aarch64-pc-windows-msvc/*-setup.exe)
          cp "$winarm_src" "eyeread.in_nightly_arm64-setup.exe"
          cp "${winarm_src}.sig" "eyeread.in_nightly_arm64-setup.exe.sig"

          # Linux AppImage + deb — pin to stable names too.
          lin_src=$(ls artifacts/nightly-x86_64-unknown-linux-gnu/*.AppImage)
          cp "$lin_src" "eyeread.in_nightly_amd64.AppImage"
          cp "${lin_src}.sig" "eyeread.in_nightly_amd64.AppImage.sig"
          cp "$(ls artifacts/nightly-x86_64-unknown-linux-gnu/*.deb)" "eyeread.in_nightly_amd64.deb"

      - name: Publish / update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: eyeread.in Nightly (${{ needs.stamp.outputs.nightly_version }})
          prerelease: true
          draft: false
          body: |
            Automated nightly build from the `dev` branch.
            Built: ${{ needs.stamp.outputs.nightly_version }}

            > ⚠️ This build may be unstable. For production use, download the [latest stable release](https://github.com/${{ github.repository }}/releases/latest).
          files: |
            eyeread.in_nightly_aarch64.app.tar.gz
            eyeread.in_nightly_aarch64.app.tar.gz.sig
            eyeread.in_nightly_aarch64.dmg
            eyeread.in_nightly_x86_64.app.tar.gz
            eyeread.in_nightly_x86_64.app.tar.gz.sig
            eyeread.in_nightly_x86_64.dmg
            eyeread.in_nightly_x64-setup.exe
            eyeread.in_nightly_x64-setup.exe.sig
            eyeread.in_nightly_arm64-setup.exe
            eyeread.in_nightly_arm64-setup.exe.sig
            eyeread.in_nightly_amd64.AppImage
            eyeread.in_nightly_amd64.AppImage.sig
            eyeread.in_nightly_amd64.deb
            latest.json
