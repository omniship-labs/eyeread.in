# Nightly build — runs once daily at 03:00 UTC, or on demand via
# workflow_dispatch.
#
# Each run gets its own permanent, uniquely-tagged GitHub Release
# (nightly-YYYYMMDD-HHMMSS) — GitHub's immutable-releases policy forbids ever
# reusing a tag that previously backed a published release, so a single
# rolling "nightly" tag (the old design) is no longer possible. After
# publishing, all but the most recent few Release objects are pruned to keep
# the Releases list from growing forever; the git tags themselves are kept
# permanently (cheap, useful for `git log`/bisecting), only the Release +
# its assets are deleted.
#
# The updater needs one endpoint URL that never changes, so latest.json is
# NOT a release asset (it would hit the same immutability wall) — it's force-
# pushed to the orphan `nightly-manifest` branch and served via
# raw.githubusercontent.com, which just serves ref content and isn't subject
# to release rules at all.
#
# The stamp job computes the version and tag once and passes them to both
# the build matrix and the publish job, preventing a midnight-crossing race
# where the two jobs would stamp different dates.
#
# Building, signing and notarization live in the shared build-app.yml
# workflow — see its header for the required secrets and environment setup.

name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Only the latest run matters — every trigger force-updates the same rolling
# "nightly" tag, so a superseded run (e.g. two manual dispatches in a row)
# should be cancelled rather than race the newer one to publish.
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      nightly_version: ${{ steps.compute.outputs.nightly_version }}
      nightly_tag: ${{ steps.compute.outputs.nightly_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Compute nightly version and release tag
        id: compute
        run: |
          STAMP=$(date -u +"%Y%m%d")
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          BASE=$(node -p "require('./package.json').version")
          echo "nightly_version=${BASE}-nightly.${STAMP}" >> "$GITHUB_OUTPUT"
          # Includes the base version for readability; seconds-granularity so
          # same-day manual dispatches never collide. Every nightly release's
          # tag is unique and permanent (see header) — no run ID needed since
          # the timestamp alone already guarantees uniqueness at this cadence.
          echo "nightly_tag=nightly-v${BASE}-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

  build:
    needs: [stamp]
    uses: ./.github/workflows/build-app.yml
    with:
      version: ${{ needs.stamp.outputs.nightly_version }}
      channel: nightly
    secrets: inherit

  publish:
    needs: [stamp, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Build latest.json
        env:
          NIGHTLY_VERSION: ${{ needs.stamp.outputs.nightly_version }}
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}/releases/download/${{ needs.stamp.outputs.nightly_tag }}"

          ARM_SIG=$(cat artifacts/nightly-aarch64-apple-darwin/macos/*.app.tar.gz.sig)
          WIN_SIG=$(cat artifacts/nightly-x86_64-pc-windows-msvc/nsis/*-setup.exe.sig)
          WINARM_SIG=$(cat artifacts/nightly-aarch64-pc-windows-msvc/nsis/*-setup.exe.sig)
          LINUX_SIG=$(cat artifacts/nightly-x86_64-unknown-linux-gnu/appimage/*.AppImage.sig)

          cat > latest.json <<EOF
          {
            "version": "$NIGHTLY_VERSION",
            "notes": "Nightly build — may be unstable.",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "$REPO/eyeread.in_nightly_aarch64.app.tar.gz",
                "signature": "$ARM_SIG"
              },
              "windows-x86_64": {
                "url": "$REPO/eyeread.in_nightly_x64-setup.exe",
                "signature": "$WIN_SIG"
              },
              "windows-aarch64": {
                "url": "$REPO/eyeread.in_nightly_arm64-setup.exe",
                "signature": "$WINARM_SIG"
              },
              "linux-x86_64": {
                "url": "$REPO/eyeread.in_nightly_amd64.AppImage",
                "signature": "$LINUX_SIG"
              }
            }
          }
          EOF

      - name: Normalize artifact filenames
        run: |
          src=$(ls artifacts/nightly-aarch64-apple-darwin/macos/*.app.tar.gz)
          cp "$src" "eyeread.in_nightly_aarch64.app.tar.gz"
          cp "${src}.sig" "eyeread.in_nightly_aarch64.app.tar.gz.sig"
          cp "$(ls artifacts/nightly-aarch64-apple-darwin/dmg/*.dmg)" "eyeread.in_nightly_aarch64.dmg"
          # Windows installers — pin to stable names (the `nightly` tag is reused).
          win_src=$(ls artifacts/nightly-x86_64-pc-windows-msvc/nsis/*-setup.exe)
          cp "$win_src" "eyeread.in_nightly_x64-setup.exe"
          cp "${win_src}.sig" "eyeread.in_nightly_x64-setup.exe.sig"
          winarm_src=$(ls artifacts/nightly-aarch64-pc-windows-msvc/nsis/*-setup.exe)
          cp "$winarm_src" "eyeread.in_nightly_arm64-setup.exe"
          cp "${winarm_src}.sig" "eyeread.in_nightly_arm64-setup.exe.sig"

          # Linux AppImage + deb — pin to stable names too.
          lin_src=$(ls artifacts/nightly-x86_64-unknown-linux-gnu/appimage/*.AppImage)
          cp "$lin_src" "eyeread.in_nightly_amd64.AppImage"
          cp "${lin_src}.sig" "eyeread.in_nightly_amd64.AppImage.sig"
          cp "$(ls artifacts/nightly-x86_64-unknown-linux-gnu/deb/*.deb)" "eyeread.in_nightly_amd64.deb"

      - name: Create draft nightly release with assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ needs.stamp.outputs.nightly_tag }}
          name: eyeread.in Nightly (${{ needs.stamp.outputs.nightly_version }})
          prerelease: true
          # Immutable releases lock asset uploads the instant a release
          # publishes — even on a brand-new tag, draft: false here would
          # publish immediately and then reject this same action's own
          # asset-upload calls. Create as a draft (mutable, assets attach
          # fine) and flip it to published as a separate step below, once
          # every asset is already in place.
          draft: true
          body: |
            Automated nightly build from the `main` branch.
            Built: ${{ needs.stamp.outputs.nightly_version }}

            > ⚠️ This build may be unstable. For production use, download the [latest stable release](https://github.com/${{ github.repository }}/releases/latest).
          files: |
            eyeread.in_nightly_aarch64.app.tar.gz
            eyeread.in_nightly_aarch64.app.tar.gz.sig
            eyeread.in_nightly_aarch64.dmg
            eyeread.in_nightly_x64-setup.exe
            eyeread.in_nightly_x64-setup.exe.sig
            eyeread.in_nightly_arm64-setup.exe
            eyeread.in_nightly_arm64-setup.exe.sig
            eyeread.in_nightly_amd64.AppImage
            eyeread.in_nightly_amd64.AppImage.sig
            eyeread.in_nightly_amd64.deb
            latest.json

      - name: Publish the draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.stamp.outputs.nightly_tag }}" \
            --repo "${{ github.repository }}" --draft=false

      - name: Prune old nightly releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only the 3 most recent nightly releases (this one included);
          # delete the rest. Tags are kept forever for history/bisecting —
          # only the Release object and its assets are removed, so this is
          # never `--cleanup-tag`.
          OLD_TAGS=$(gh release list --repo "${{ github.repository }}" --limit 100 \
            --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("nightly-"))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName')
          for tag in $OLD_TAGS; do
            echo "Pruning old nightly release: $tag"
            gh release delete "$tag" --repo "${{ github.repository }}" --yes || true
          done

      - name: Publish latest.json to the nightly-manifest branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The updater needs one endpoint URL that never changes, but every
          # nightly release now has a unique tag (immutable releases forbid
          # reusing one) — so latest.json can't live in Release assets as the
          # stable pointer. Force-push it to an orphan branch instead and
          # serve it via raw.githubusercontent.com, which just serves ref
          # content and isn't subject to release rules at all.
          SRC_JSON="$(pwd)/latest.json"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/manifest
          cd /tmp/manifest
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          # Copy latest.json in AFTER checkout, not before — checking out an
          # existing branch refuses to overwrite an already-present untracked
          # file, which is exactly what copying it first here would create.
          if git ls-remote --exit-code --heads origin nightly-manifest > /dev/null 2>&1; then
            git fetch -q origin nightly-manifest
            git checkout -q -B nightly-manifest origin/nightly-manifest
          else
            git checkout -q --orphan nightly-manifest
          fi
          cp "$SRC_JSON" latest.json
          git add latest.json
          git commit -q -m "Nightly manifest: ${{ needs.stamp.outputs.nightly_tag }}" --allow-empty
          git push -q origin nightly-manifest
