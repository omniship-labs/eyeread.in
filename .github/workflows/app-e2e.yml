# Visual regression tests for the app (src/), driven via the browser/web-demo
# build (see src/lib/tauri.js). Diffs against a baseline generated in CI, not
# a committed one (see playwright.app.config.js's doc comment for why: a
# baseline rendered on a different machine/Chromium build is a source of
# false failures, not a safety net). Site E2E (site-e2e.yml) does the
# equivalent for the marketing site.
#
# One `capture` job, matrixed over base/head (same pattern as build-app.yml's
# platform matrix): each matrix run resolves which commit it's responsible
# for, then hands off to .github/actions/capture-playwright-screenshots (the
# actual checkout/cache/install/render/upload work, shared with
# site-e2e.yml) — no comparison happening yet. `compare` (needs: [capture])
# downloads both matrix runs' artifacts and diffs them with
# scripts/compare-screenshots.mjs (plain Node, no browser needed).
name: App E2E

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'design/**'
      - 'tests/app/**'
      - 'scripts/compare-screenshots.mjs'
      - '.github/actions/capture-playwright-screenshots/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.app.config.js'
      - '.github/workflows/app-e2e.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'design/**'
      - 'tests/app/**'
      - 'scripts/compare-screenshots.mjs'
      - '.github/actions/capture-playwright-screenshots/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.app.config.js'
      - '.github/workflows/app-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  capture:
    strategy:
      fail-fast: false
      matrix:
        variant: [base, head]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 — the base variant's ref (resolved below) needs to be
      # reachable for .github/actions/capture-playwright-screenshots' own
      # checkout step, which a shallow clone won't guarantee.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # head always resolves to the commit under test. base resolves to the
      # PR's base commit (or the previous commit, for a push) — a brand-new
      # branch's first push (or a force-push with no prior history) has no
      # real "before" commit, so there's nothing to diff against.
      - name: Resolve ref to capture
        id: resolve
        run: |
          if [ "${{ matrix.variant }}" = "head" ]; then
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              SHA="${{ github.event.pull_request.base.sha }}"
            else
              SHA="${{ github.event.before }}"
            fi
            if [ "$SHA" = "0000000000000000000000000000000000000000" ]; then
              SHA=""
            fi
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/capture-playwright-screenshots
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          artifact-name: app-e2e-screenshots-${{ matrix.variant }}
          # Direct `npx playwright`, not `npm run app:test:update` — the base
          # leg checks out an old ref, and a script that only exists in a
          # later commit's package.json would 404 there (see site-e2e.yml's
          # equivalent comment, which hit exactly this).
          test-command: npx playwright test --config=playwright.app.config.js --update-snapshots
          screenshots-path: tests/app/visual.spec.js-snapshots
          cache-key-prefix: app-e2e-screenshots-v1
          config-file: playwright.app.config.js
          tests-dir: tests/app

  compare:
    needs: [capture]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # to push diff images below — read-only everywhere else
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Download base screenshots
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true # no baseline (see capture-playwright-screenshots' empty-ref guard)
        with:
          name: app-e2e-screenshots-base
          path: __baseline__
      - name: Download head screenshots
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-e2e-screenshots-head
          path: __head__

      # Diff images the PR comment links/embeds live in a dedicated branch —
      # raw.githubusercontent.com URLs render inline in GitHub markdown with
      # no third-party image host needed. Scoped per PR + run so concurrent
      # or re-triggered runs never collide. Safe to compute this URL before
      # anything's actually pushed there (below): nothing reads it until the
      # PR comment is posted, the very last step in this job.
      - name: Resolve diff image destination
        id: images
        run: |
          DEST="pr-${{ github.event.pull_request.number || format('push-{0}', github.run_id) }}/${{ github.run_id }}"
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"
          echo "base-url=https://raw.githubusercontent.com/${{ github.repository }}/app-e2e-diffs/$DEST" >> "$GITHUB_OUTPUT"

      - name: Compare
        id: compare
        run: |
          node scripts/compare-screenshots.mjs __baseline__ __head__ __diff__ \
            "${{ steps.images.outputs.base-url }}"

      # Best-effort: a fork PR's default token is read-only here (GitHub
      # denies contents: write to pull_request-triggered runs from forks,
      # regardless of what this workflow declares), so this step just fails
      # quietly for those and the comment falls back to text-only details —
      # the pass/fail result itself never depends on this succeeding.
      - name: Publish diff images
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          if [ -z "$(ls -A __diff__/images 2>/dev/null)" ]; then
            echo "No diff images to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin app-e2e-diffs 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/app-e2e-diffs; then
            git worktree add -B app-e2e-diffs __diffs_branch__ origin/app-e2e-diffs
          else
            git worktree add --detach __diffs_branch__
            (cd __diffs_branch__ && git checkout --orphan app-e2e-diffs && git rm -rf . > /dev/null)
          fi
          mkdir -p "__diffs_branch__/${{ steps.images.outputs.dest }}"
          cp __diff__/images/*.png "__diffs_branch__/${{ steps.images.outputs.dest }}/"
          cd __diffs_branch__
          git add "${{ steps.images.outputs.dest }}"
          git commit -m "Diff images for run ${{ github.run_id }}"
          # A concurrent run on another PR may have pushed to this branch
          # between our fetch and now — rebase and retry a couple of times
          # rather than failing outright over an unrelated subdirectory.
          for _ in 1 2 3; do
            git push origin HEAD:app-e2e-diffs && break
            git fetch origin app-e2e-diffs
            git rebase origin/app-e2e-diffs
          done

      - name: Build PR comment
        if: ${{ !cancelled() }}
        run: |
          mkdir -p __diff__
          {
            echo "### 🧿 App visual regression — $([ '${{ steps.compare.outcome }}' = 'success' ] && echo '✅ passed' || echo '❌ failed')"
            echo
            echo "Compared the main window (3 sizes), overlay popup, Settings, About, and a11y-setting"
            echo "variations, in \`en\`/\`de\` — head commit vs. a baseline captured from the base commit,"
            echo "both rendered in this same workflow run on identical hardware/Chromium."
            echo
            cat __diff__/summary.md 2>/dev/null || echo "_No summary produced — see the job log._"
            if grep -q '🆕' __diff__/summary.md 2>/dev/null; then
              echo
              echo "New screenshots (🆕 above) aren't failures — there's no prior run to compare a"
              echo "brand-new test case against. They become the baseline for every future run."
            fi
            echo
            echo "<sub>[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · commit ${{ github.sha }}</sub>"
          } > __diff__/pr-comment.md
      - name: Upload diff images + summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-e2e-diff
          path: __diff__
          retention-days: 14
          if-no-files-found: ignore
      - name: Comment result on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: app-e2e-visual-regression
          path: __diff__/pr-comment.md
