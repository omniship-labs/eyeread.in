# Visual regression tests for the app (src/), driven via the browser/web-demo
# build (see src/lib/tauri.js). Unlike Site E2E's screenshots-for-review-only
# approach, this does real automated pixel diffing — but against a baseline
# generated in CI, not a committed one (see playwright.app.config.js's doc
# comment for why: a baseline rendered on a different machine/Chromium build
# is a source of false failures, not a safety net).
#
# Three jobs:
#   capture-base — captures screenshots from the PR's base commit (or the
#     previous commit, for a push). Cached per base commit SHA, since the
#     base rarely changes across re-pushes to the same PR.
#   capture-head — captures screenshots from the commit under test. Runs in
#     parallel with capture-base (independent, so no reason to serialize).
#   compare — downloads both screenshot sets and diffs them with
#     scripts/compare-app-screenshots.mjs (plain Node, no browser needed).
name: App E2E

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'design/**'
      - 'tests/app/**'
      - 'scripts/compare-app-screenshots.mjs'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.app.config.js'
      - '.github/workflows/app-e2e.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'design/**'
      - 'tests/app/**'
      - 'scripts/compare-app-screenshots.mjs'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.app.config.js'
      - '.github/workflows/app-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  capture-base:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve base commit
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.base.sha }}"
          else
            SHA="${{ github.event.before }}"
          fi
          # A brand-new branch's first push (or a force-push with no prior
          # history) has no real "before" commit — nothing to diff against.
          if [ -z "$SHA" ] || [ "$SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "has_base=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_base=true" >> "$GITHUB_OUTPUT"
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.resolve.outputs.has_base == 'true'
        with:
          ref: ${{ steps.resolve.outputs.sha }}

      # Keyed on the base commit's own SHA — a re-push to the same PR (its
      # base commit unchanged) hits this on every subsequent run, skipping
      # straight to the upload step below with no rebuild at all.
      - name: Cache baseline screenshots for this base commit
        if: steps.resolve.outputs.has_base == 'true'
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tests/app/visual.spec.js-snapshots
          key: app-e2e-baseline-v1-${{ steps.resolve.outputs.sha }}

      - if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Check the suite exists at this base commit
        if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true'
        id: has_suite
        run: |
          if [ -f playwright.app.config.js ] && [ -d tests/app ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            # This suite doesn't exist yet at the base commit (true today —
            # it hasn't reached main). Nothing to capture; the compare job
            # will just treat every head screenshot as new.
            echo "This suite doesn't exist at the base commit — skipping capture."
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true' && steps.has_suite.outputs.value == 'true'
        run: npm ci

      - name: Install Playwright OS dependencies
        if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true' && steps.has_suite.outputs.value == 'true'
        run: npx playwright install-deps chromium

      - name: Cache Playwright browser binary
        if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true' && steps.has_suite.outputs.value == 'true'
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Download Playwright browser
        if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true' && steps.has_suite.outputs.value == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Capture screenshots from the base commit
        if: steps.resolve.outputs.has_base == 'true' && steps.cache.outputs.cache-hit != 'true' && steps.has_suite.outputs.value == 'true'
        run: npm run app:test:update

      - name: Upload baseline screenshots
        if: steps.resolve.outputs.has_base == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-e2e-baseline-screenshots
          path: tests/app/visual.spec.js-snapshots
          retention-days: 14
          if-no-files-found: ignore

  capture-head:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium
      - name: Cache Playwright browser binary
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Download Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - name: Capture screenshots from the commit under test
        run: npm run app:test:update
      - name: Upload head screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-e2e-head-screenshots
          path: tests/app/visual.spec.js-snapshots
          retention-days: 14

  compare:
    needs: [capture-base, capture-head]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Download baseline screenshots
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true # no baseline (see capture-base's "has_base" guard)
        with:
          name: app-e2e-baseline-screenshots
          path: __baseline__
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-e2e-head-screenshots
          path: __head__
      - name: Compare
        id: compare
        run: node scripts/compare-app-screenshots.mjs __baseline__ __head__ __diff__
      - name: Build PR comment
        if: ${{ !cancelled() }}
        run: |
          mkdir -p __diff__
          {
            echo "### 🧿 App visual regression — $([ '${{ steps.compare.outcome }}' = 'success' ] && echo '✅ passed' || echo '❌ failed')"
            echo
            echo "Compared the main window (3 sizes), overlay popup, Settings, About, and a11y-setting"
            echo "variations, in \`en\`/\`de\` — head commit vs. a baseline captured from the base commit,"
            echo "both rendered in this same workflow run on identical hardware/Chromium."
            echo
            cat __diff__/summary.md 2>/dev/null || echo "_No summary produced — see the job log._"
            if grep -q '🆕' __diff__/summary.md 2>/dev/null; then
              echo
              echo "New screenshots (🆕 above) aren't failures — there's no prior run to compare a"
              echo "brand-new test case against. They become the baseline for every future run."
            fi
            echo
            echo "<sub>[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · commit ${{ github.sha }}</sub>"
          } > __diff__/pr-comment.md
      - name: Upload diff images + summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-e2e-diff
          path: __diff__
          retention-days: 14
          if-no-files-found: ignore
      - name: Comment result on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: app-e2e-visual-regression
          path: __diff__/pr-comment.md
