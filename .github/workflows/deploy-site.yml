# Build the marketing site (Vite + React, in site/) and deploy to GitHub Pages.
# Design tokens and brand assets are imported from design/ and bundled by Vite,
# so there are no vendored copies to keep in sync.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'design/**'
      - 'public/favicon.svg'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-site.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Pages needs these permissions; concurrency keeps deploys serialized.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run site:build

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
