# Build the marketing site (Vite + React, in site/) and deploy to GitHub Pages.
# Design tokens and brand assets are imported from design/ and bundled by Vite,
# so there are no vendored copies to keep in sync.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'design/**'
      - 'public/favicon.svg'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-site.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Pages needs these permissions; concurrency keeps deploys serialized.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run site:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
