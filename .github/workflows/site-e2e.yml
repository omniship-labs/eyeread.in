# Playwright responsiveness tests for the marketing site (site/).
# Scoped to site-related paths so the Chromium download + browser run only
# happens on PRs/pushes that can actually affect the rendered page — Rust-app
# or unrelated changes skip it.
name: Site E2E

on:
  push:
    branches: [main, dev]
    paths:
      - 'site/**'
      - 'design/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - '.github/workflows/site-e2e.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'design/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - '.github/workflows/site-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run site:test
      - name: Upload screenshots & report
        id: artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            site/tests/screenshots/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload desktop screenshot
        id: artifact_desktop
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshot-desktop
          path: site/tests/screenshots/home-desktop.png
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload tablet screenshot
        id: artifact_tablet
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshot-tablet
          path: site/tests/screenshots/home-tablet.png
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload mobile screenshot
        id: artifact_mobile
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshot-mobile
          path: site/tests/screenshots/home-mobile.png
          retention-days: 14
          if-no-files-found: ignore
      # Sticky comment (created once, updated on each run) linking to the
      # downloadable screenshots + report. PR-only; fork PRs get a read-only
      # token so this is best-effort there.
      - name: Comment screenshot link on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: site-e2e-screenshots
          message: |
            ### 📸 Site responsiveness screenshots — ${{ job.status == 'success' && '✅ passed' || '❌ failed' }}

            Playwright captured full-page screenshots at **desktop / tablet / mobile** viewports.

            | Viewport | Direct download |
            |----------|----------------|
            | Desktop (1280×800) | [⬇️ home-desktop.png](${{ steps.artifact_desktop.outputs.artifact-url }}) |
            | Tablet (768×1024) | [⬇️ home-tablet.png](${{ steps.artifact_tablet.outputs.artifact-url }}) |
            | Mobile (390×844) | [⬇️ home-mobile.png](${{ steps.artifact_mobile.outputs.artifact-url }}) |

            **[⬇️ Download all screenshots & HTML report](${{ steps.artifact.outputs.artifact-url }})** (zip)

            <sub>[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · commit ${{ github.sha }}</sub>
