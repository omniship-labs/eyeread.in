name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue! We'll take a look soon.
            Please make sure you've described the problem clearly and included steps to reproduce if it's a bug.
          pr-message: |
            👋 Thanks for your first pull request! Before we review, please make sure the [CLA](https://github.com/omniship-labs/eyeread.in/blob/main/CLA.md) is signed — a bot will check automatically and prompt you if needed.
