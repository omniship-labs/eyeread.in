name: Compat report → PR

# Turns an accepted community compatibility report into a pull request that
# updates the compat matrix data. A maintainer stays in the loop twice:
#   1. They apply the `compat:accepted` label after triaging the issue — that
#      label is the ONLY thing that triggers this workflow, so spam/garbage
#      reports never reach the bot.
#   2. They review and merge the PR it opens. Merging closes the issue
#      ("Closes #N"); reports that are never merged are swept by stale.yml.
#
# The job always checks out a FRESH copy of the default branch, so each PR is
# built on top of the latest main — no drift.
#
# Note: PRs opened with the default GITHUB_TOKEN don't themselves trigger other
# workflows (GitHub's loop-prevention). That's fine here — the change is data
# JSON and gets validated by site CI once a human pushes/merges.

on:
  issues:
    types: [labeled]

# Least privilege: open a PR, read the issue. Nothing else.
permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: compat-report-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  build-pr:
    # Only the trusted gate label triggers anything.
    if: github.event.label.name == 'compat:accepted'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the latest default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Parse the issue form
        id: parse
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f # v3.2.5
        with:
          template-path: .github/ISSUE_TEMPLATE/3-compat-report.yml

      - name: Apply the report to compat data
        id: apply
        env:
          ISSUE_JSON: ${{ steps.parse.outputs.jsonString }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: node scripts/apply-compat-report.mjs

      - name: Open / update the pull request
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: ${{ github.event.repository.default_branch }}
          branch: ${{ steps.apply.outputs.pr_branch }}
          delete-branch: true
          title: ${{ steps.apply.outputs.pr_title }}
          body-path: pr-body.md
          labels: compatibility
          commit-message: ${{ steps.apply.outputs.pr_title }}
          add-paths: site/src/data/compat.data.json
