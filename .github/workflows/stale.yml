name: Stale

on:
  schedule:
    - cron: '0 4 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,roadmap
          exempt-pr-labels: pinned,security
          stale-issue-message: >
            This issue has been automatically marked as stale because it hasn't had
            activity in 60 days. It will be closed in 14 days unless it receives a
            comment or label update.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it hasn't
            had activity in 60 days. It will be closed in 14 days unless it receives a
            comment or review.
          close-issue-message: Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: Closing due to inactivity. Feel free to reopen if this is still relevant.
