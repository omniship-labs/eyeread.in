name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'

    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Store signatures in a dedicated branch so they survive repo changes
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/omniship-labs/eyeread.in/blob/main/CLA.md
          branch: cla-signatures
          allowlist: omniship-labs-bot,dependabot[bot]
          # Message shown on PR when CLA has not been signed
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, please sign
            the [Contributor License Agreement](https://github.com/omniship-labs/eyeread.in/blob/main/CLA.md).

            To sign, add a comment on this PR with exactly:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
