# Stable release — triggered by pushing a version tag (e.g. v0.1.0).
#
# Builds a signed + notarized .dmg for arm64 and x86_64, generates
# latest.json for the Tauri updater, and creates a draft GitHub Release.
#
# ── Secrets required ────────────────────────────────────────────────────────
#   TAURI_SIGNING_PRIVATE_KEY            output of `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   passphrase (can be empty string)
#   APPLE_CERTIFICATE            base64-encoded Developer ID .p12 cert
#   APPLE_CERTIFICATE_PASSWORD   password for the .p12
#   APPLE_SIGNING_IDENTITY       "Developer ID Application: OmniShip (TEAMID)"
#   APPLE_ID                     Apple ID email used for notarization
#   APPLE_ID_PASSWORD            app-specific password for that Apple ID
#   APPLE_TEAM_ID                10-char Apple team ID

name: Release (stable)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

      - name: Build, sign & notarize
        env:
          RELEASE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run tauri build -- \
            --target ${{ matrix.target }} \
            --bundles dmg,updater

      - uses: actions/upload-artifact@v4
        with:
          name: stable-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

          ARM_SIG=$(cat artifacts/stable-aarch64-apple-darwin/*.app.tar.gz.sig)
          X86_SIG=$(cat artifacts/stable-x86_64-apple-darwin/*.app.tar.gz.sig)

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See the release page for full details.",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "$REPO/eyeread.in_${VERSION}_aarch64.app.tar.gz",
                "signature": "$ARM_SIG"
              },
              "darwin-x86_64": {
                "url": "$REPO/eyeread.in_${VERSION}_x86_64.app.tar.gz",
                "signature": "$X86_SIG"
              }
            }
          }
          EOF

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eyeread.in ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            latest.json
