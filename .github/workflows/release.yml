# Stable release — triggered by pushing a version tag (e.g. v0.1.0)
# or via workflow_dispatch with a version number input.
#
# The prepare job validates the version, optionally creates the git tag,
# and passes the version string to the build and publish jobs.
#
# ── Secrets required ────────────────────────────────────────────────────────
#   TAURI_SIGNING_PRIVATE_KEY            output of `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   passphrase (can be empty string)
#   APPLE_CERTIFICATE            base64-encoded Developer ID .p12 cert
#   APPLE_CERTIFICATE_PASSWORD   password for the .p12
#   APPLE_SIGNING_IDENTITY       "Developer ID Application: OmniShip (TEAMID)"
#   APPLE_ID                     Apple ID email used for notarization
#   APPLE_ID_PASSWORD            app-specific password for that Apple ID
#   APPLE_TEAM_ID                10-char Apple team ID

name: Release (stable)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release (e.g. 0.1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate semver and ordering
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION" && exit 1
          fi
          CURRENT=$(node -p "require('./package.json').version")
          node -e "
            const [a,b,c] = '$VERSION'.split('.').map(Number);
            const [x,y,z] = '$CURRENT'.split('.').map(Number);
            if (a*1e6+b*1e3+c < x*1e6+y*1e3+z) {
              console.error('v$VERSION is older than current $CURRENT — aborting.');
              process.exit(1);
            }
          "

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.resolve.outputs.version }}"
          git push origin "v${{ steps.resolve.outputs.version }}"

  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Stamp version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Import Apple signing certificate
        uses: ./.github/actions/import-apple-cert
        with:
          certificate: ${{ secrets.APPLE_CERTIFICATE }}
          certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build, sign & notarize
        env:
          RELEASE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run tauri build -- \
            --target ${{ matrix.target }} \
            --bundles dmg,updater

      - uses: actions/upload-artifact@v4
        with:
          name: stable-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          ARM_SIG=$(cat artifacts/stable-aarch64-apple-darwin/*.app.tar.gz.sig)
          X86_SIG=$(cat artifacts/stable-x86_64-apple-darwin/*.app.tar.gz.sig)

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See the release page for full details.",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "$REPO/eyeread.in_${VERSION}_aarch64.app.tar.gz",
                "signature": "$ARM_SIG"
              },
              "darwin-x86_64": {
                "url": "$REPO/eyeread.in_${VERSION}_x86_64.app.tar.gz",
                "signature": "$X86_SIG"
              }
            }
          }
          EOF

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: eyeread.in v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            latest.json
