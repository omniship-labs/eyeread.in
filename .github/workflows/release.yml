# Stable release — triggered by pushing a version tag (e.g. v0.1.0)
# or via workflow_dispatch with a version number input.
#
# The prepare job validates the version, optionally creates the git tag,
# and passes the version string to the build and publish jobs. Building,
# signing and notarization live in the shared build-app.yml workflow —
# see its header for the required secrets and environment setup.

name: Release (stable)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release (e.g. 0.1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate semver and ordering
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION" && exit 1
          fi
          CURRENT=$(node -p "require('./package.json').version")
          node -e "
            const [a,b,c] = '$VERSION'.split('.').map(Number);
            const [x,y,z] = '$CURRENT'.split('.').map(Number);
            if (a*1e6+b*1e3+c < x*1e6+y*1e3+z) {
              console.error('v$VERSION is older than current $CURRENT — aborting.');
              process.exit(1);
            }
          "

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.resolve.outputs.version }}"
          git push origin "v${{ steps.resolve.outputs.version }}"

  build:
    needs: [prepare]
    uses: ./.github/workflows/build-app.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      channel: stable
    secrets: inherit

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Build latest.json
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          ARM_SIG=$(cat artifacts/stable-aarch64-apple-darwin/macos/*.app.tar.gz.sig)

          # Windows NSIS updater artifacts — discover the exact installer names
          # (the arch token in `*_x64-setup.exe` / `*_arm64-setup.exe` is set by
          # the bundler).
          WIN_DIR=artifacts/stable-x86_64-pc-windows-msvc/nsis
          WIN_EXE=$(basename "$(ls "$WIN_DIR"/*-setup.exe)")
          WIN_SIG=$(cat "$WIN_DIR"/*-setup.exe.sig)

          WINARM_DIR=artifacts/stable-aarch64-pc-windows-msvc/nsis
          WINARM_EXE=$(basename "$(ls "$WINARM_DIR"/*-setup.exe)")
          WINARM_SIG=$(cat "$WINARM_DIR"/*-setup.exe.sig)

          # Linux AppImage updater artifact — arch token (`amd64`) is set by the
          # bundler, so discover the name rather than hardcoding it.
          LINUX_DIR=artifacts/stable-x86_64-unknown-linux-gnu/appimage
          LINUX_APP=$(basename "$(ls "$LINUX_DIR"/*.AppImage)")
          LINUX_SIG=$(cat "$LINUX_DIR"/*.AppImage.sig)

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See the release page for full details.",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url": "$REPO/eyeread.in_${VERSION}_aarch64.app.tar.gz",
                "signature": "$ARM_SIG"
              },
              "windows-x86_64": {
                "url": "$REPO/${WIN_EXE}",
                "signature": "$WIN_SIG"
              },
              "windows-aarch64": {
                "url": "$REPO/${WINARM_EXE}",
                "signature": "$WINARM_SIG"
              },
              "linux-x86_64": {
                "url": "$REPO/${LINUX_APP}",
                "signature": "$LINUX_SIG"
              }
            }
          }
          EOF

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: eyeread.in v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*-setup.exe
            artifacts/**/*-setup.exe.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.deb
            latest.json
